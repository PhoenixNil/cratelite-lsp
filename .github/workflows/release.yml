name: Release

on:
  push:
    tags:
      - "v*"           # 触发条件：推送 v0.1.0 这样的 tag

permissions:
  contents: write      # 允许创建 Release 并上传 assets

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: cratelite-lsp-aarch64-apple-darwin

          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: cratelite-lsp-x86_64-apple-darwin

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: cratelite-lsp-x86_64-unknown-linux-musl

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: cratelite-lsp-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl 需要 musl-tools
      - name: Install musl-tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # 把二进制重命名成 Zed 扩展期望的名字
      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/cratelite-lsp ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          copy target\${{ matrix.target }}\release\cratelite-lsp.exe ${{ matrix.asset_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
